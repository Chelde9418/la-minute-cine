backend:
  name: github
  repo: Chelde9418/la-minute-cine
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "articles"
    label: "Articles"
    label_singular: "Article"
    folder: "src/content/articles"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Catégorie", name: "category", widget: "select", options: ["Films", "Séries", "Avis", "Top Lists"] }
      - { label: "Image de couverture", name: "image", widget: "image" }
      - { label: "Résumé", name: "excerpt", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Temps de lecture", name: "readTime", widget: "string", default: "5 min" }
      - { label: "Contenu", name: "body", widget: "markdown" }
      - { label: "ID Unique", name: "id", widget: "hidden", default: "{{slug}}" }
